name: pridec

# NOTE: these services are not meant to run in parellel. These should always be run via `docker compose run` to
# launch a specific service and not the whole workflow at once. 

# This pulls an already built image.

#This is now done in the standard compose.yaml, but should be checked. MAY BE DEPRECATED

services:
  etl:
    image: mvevans89/pridec_etl:latest
    network_mode: "host"
    volumes:
     - type: bind
       source: ./input
       target: /app/input
       bind:
          create_host_path: false
       read_only: false
     - type: bind
       source: ./output
       target: /app/output
       bind:
          create_host_path: true
       read_only: false
     - type: bind
       source: ./.gee-private-key.json
       target: /app/.gee-private-key.json
       bind:
          create_host_path: false
       read_only: true

  forecast:
    image: mvevans89/pridec_forecast:latest
    network_mode: "host"
    cap_add:
      - SYS_NICE  
    volumes:
     - type: bind
       source: ./input
       target: /app/input
       bind:
          create_host_path: true
       read_only: true
     - type: bind
       source: ./output
       target: /app/output
       bind:
          create_host_path: true
       read_only: false

