name: pridec

# NOTE: these services are not meant to run in parellel. These should always be run via `docker compose run` to
# launch a specific service and not the whole workflow at once. Yes this could be updated using an API.

services:
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    image: mvevans89/pridec_etl:latest
    network_mode: "host"
    volumes:
     - type: bind
       source: ./input
       target: /app/input
       bind:
          create_host_path: true
       read_only: false
     - type: bind
       source: ./output
       target: /app/output
       bind:
          create_host_path: true
       read_only: false
     - type: bind
       source: ./.gee-private-key.json
       target: /app/.gee-private-key.json
       bind:
          create_host_path: false
       read_only: true

  forecast:
    build:
      context: ./forecast
      dockerfile: Dockerfile
    image: mvevans89/pridec_forecast:latest
    network_mode: "host"
    cap_add:
      - SYS_NICE
    volumes:
     - type: bind
       source: ./input
       target: /app/input
       bind:
          create_host_path: true
       read_only: true
     - type: bind
       source: ./output
       target: /app/output
       bind:
          create_host_path: true
       read_only: false



  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: pridec_web:latest
    network_mode: "host"
    env_file:
      - path: ${HOST_PWD:-.}/.env
        required: false
    environment:
      HOST_PWD: ${HOST_PWD:-.}
    volumes:
      - type: bind
        source: ${HOST_PWD:-.}/input
        target: /app/input
        bind:
          create_host_path: true
        read_only: false
      - type: bind
        source: ${HOST_PWD:-.}/output
        target: /app/output
        bind:
          create_host_path: true
        read_only: false
      - type: bind
        source: ${HOST_PWD:-.}/.gee-private-key.json
        target: /app/.gee-private-key.json
        bind:
          create_host_path: false
        read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind:
          create_host_path: false
        read_only: false
